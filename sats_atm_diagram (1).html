<!DOCTYPE html>
<html lang="en">
<head>

<title>Sats ATM — System Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f8f8f6;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 32px 24px;
  }
  header { margin-bottom: 28px; }
  header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; }
  header p  { font-size: 13px; color: #888780; }
  .diagram-wrap { background: #fff; border-radius: 16px; border: 0.5px solid #e0dfd8; padding: 28px 20px 20px; overflow-x: auto; }
  svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .node { cursor: pointer; }
  .node:hover rect, .node:hover circle { opacity: 0.85; }

  /* Tooltip */
  #tip {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: #fff; font-size: 13px;
    padding: 10px 18px; border-radius: 8px;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; white-space: nowrap; z-index: 100;
    max-width: 90vw; white-space: normal; text-align: center;
  }
  #tip.show { opacity: 1; }

  footer { margin-top: 20px; font-size: 11px; color: #aaa; text-align: center; }
  footer a { color: #1D9E75; text-decoration: none; }
</style>
</head>

<!-- ═══════════════════════════════════════════════════════
     STAGE 1 — HARDWARE
     ═══════════════════════════════════════════════════ -->

<!-- Section label -->
<text x="165" y="62" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="1">VISITOR JOURNEY</text>

<!-- Download Blink -->
<g class="node" data-tip="Visitors download the free Blink app, create a Bitcoin Lightning wallet, and set a username like 'alice'. The username is how the ATM sends them sats." onclick="showTip(this)">
  <rect x="22" y="70" width="286" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.7"/>
  <text x="165" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Download Blink app</text>
  <text x="165" y="108" text-anchor="middle" font-size="11" fill="#0F6E56">Create account + username</text>
</g>
<line x1="165" y1="118" x2="165" y2="132" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Insert coins -->
<g class="node" data-tip="Visitor inserts euro coins into the HX-916 coin acceptor. Each coin type sends a set number of pulses. The ESP32 counts pulses and converts to a euro value." onclick="showTip(this)">
  <rect x="22" y="132" width="286" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.7"/>
  <text x="165" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Insert euro coins</text>
  <text x="165" y="170" text-anchor="middle" font-size="11" fill="#0F6E56">HX-916 counts pulses → ESP32</text>
</g>

<!-- Section label -->
<text x="165" y="202" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="1">LOCKED ENCLOSURE</text>

<!-- Enclosure border -->
<rect x="14" y="208" width="302" height="286" rx="12" fill="none" stroke="#ccc" stroke-width="0.8" stroke-dasharray="6 4"/>

<!-- HX-916 -->
<g class="node" data-tip="The HX-916 coin acceptor validates coins mechanically and sends electrical pulses. Default: 10 pulses per euro. Configurable via DIP switches and the settings screen." onclick="showTip(this)">
  <rect x="24" y="216" width="282" height="48" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.7"/>
  <text x="165" y="236" text-anchor="middle" font-size="12" font-weight="600" fill="#412402">HX-916 coin acceptor</text>
  <text x="165" y="254" text-anchor="middle" font-size="11" fill="#854F0B">12V · pulse signal out</text>
</g>
<line x1="165" y1="264" x2="165" y2="278" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- PC817 -->
<g class="node" data-tip="The PC817 optocoupler electrically isolates the 12V coin acceptor signal from the 3.3V ESP32. Without this the ESP32 GPIO would be destroyed. Wired via a 1kΩ and 10kΩ resistor." onclick="showTip(this)">
  <rect x="24" y="278" width="282" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.7"/>
  <text x="165" y="298" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">PC817 optocoupler</text>
  <text x="165" y="316" text-anchor="middle" font-size="11" fill="#5F5E5A">12V → 3.3V isolation · GPIO4</text>
</g>
<line x1="165" y1="326" x2="165" y2="340" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- ESP32 -->
<g class="node" data-tip="The ESP32 is the brain of the ATM. It runs the firmware, serves the tablet UI via WiFi AP, connects to the internet via WiFi STA, calls the Blink API, and reads VE.Direct solar data." onclick="showTip(this)">
  <rect x="24" y="340" width="282" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.7"/>
  <text x="165" y="362" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">ESP32 NodeMCU</text>
  <text x="165" y="378" text-anchor="middle" font-size="11" fill="#3C3489">Firmware · web server · API client</text>
  <text x="165" y="394" text-anchor="middle" font-size="11" fill="#3C3489">WiFi AP (tablet) + STA (internet)</text>
</g>
<line x1="165" y1="400" x2="165" y2="414" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Fire tablet -->
<g class="node" data-tip="The Amazon Fire tablet connects to the ESP32's WiFi AP (SatsATM / lightning). It opens 192.168.4.1 in the browser. The ESP32 serves the full ATM UI as a single HTML page." onclick="showTip(this)">
  <rect x="24" y="414" width="282" height="48" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.7"/>
  <text x="165" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">Fire tablet</text>
  <text x="165" y="452" text-anchor="middle" font-size="11" fill="#0C447C">Browser UI · 192.168.4.1 · WiFi AP</text>
</g>
<line x1="165" y1="462" x2="165" y2="476" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- TP-Link -->
<g class="node" data-tip="The TP-Link MR570 4G modem provides internet connectivity. The ESP32 connects via WiFi STA. All Blink API calls (rate, balance, payments) go through this modem to the internet." onclick="showTip(this)">
  <rect x="24" y="476" width="282" height="48" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.7"/>
  <text x="165" y="496" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">TP-Link MR570</text>
  <text x="165" y="514" text-anchor="middle" font-size="11" fill="#0C447C">4G modem · internet via WiFi STA</text>
</g>

<!-- Section label -->
<text x="165" y="548" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="1">POWER SYSTEM</text>

<!-- Solar + mains -->
<g class="node" data-tip="Solar panel feeds the Victron MPPT charge controller. Up to 75W, 12V panel recommended. The MPPT optimises charging and protects the battery." onclick="showTip(this)">
  <rect x="24" y="556" width="138" height="48" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.7"/>
  <text x="93" y="576" text-anchor="middle" font-size="12" font-weight="600" fill="#412402">Solar panel</text>
  <text x="93" y="594" text-anchor="middle" font-size="11" fill="#854F0B">12V · up to 75W</text>
</g>
<g class="node" data-tip="A 12V mains LiFePO4 charger can be plugged in via a jack socket on the enclosure. The buck converter handles any voltage up to 14.6V safely. Use when solar is unavailable." onclick="showTip(this)">
  <rect x="170" y="556" width="136" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.7"/>
  <text x="238" y="576" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Mains charger</text>
  <text x="238" y="594" text-anchor="middle" font-size="11" fill="#5F5E5A">Alternative 12V input</text>
</g>

<line x1="93"  y1="604" x2="145" y2="618" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="238" y1="604" x2="185" y2="618" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Victron MPPT -->
<g class="node" data-tip="The Victron SmartSolar MPPT 75/15 manages solar charging. It outputs VE.Direct serial data (TX → ESP32 GPIO16) with live battery voltage, panel power, charge state, and yield." onclick="showTip(this)">
  <rect x="24" y="618" width="282" height="48" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.7"/>
  <text x="165" y="638" text-anchor="middle" font-size="12" font-weight="600" fill="#412402">Victron SmartSolar MPPT 75/15</text>
  <text x="165" y="656" text-anchor="middle" font-size="11" fill="#854F0B">Charge controller · VE.Direct → GPIO16</text>
</g>
<line x1="165" y1="666" x2="165" y2="680" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Battery -->
<g class="node" data-tip="A 12V 6Ah LiFePO4 battery stores energy. The MPPT load output feeds a buck converter (12V→5V) which powers the tablet and ESP32. MPPT handles low voltage cutoff (11.8V) in hardware." onclick="showTip(this)">
  <rect x="24" y="680" width="282" height="48" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.7"/>
  <text x="165" y="700" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">LiFePO4 12V 6Ah</text>
  <text x="165" y="718" text-anchor="middle" font-size="11" fill="#27500A">Load output → buck 12V→5V → devices</text>
</g>

<!-- Section label -->
<text x="165" y="750" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="1">OPERATOR MONITORING</text>

<!-- Solar page -->
<g class="node" data-tip="The operator opens 192.168.4.1/solar on any device connected to the SatsATM WiFi. Shows live battery voltage, state of charge, panel power, charge state, and today's yield from VE.Direct." onclick="showTip(this)">
  <rect x="24" y="758" width="282" height="48" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.7"/>
  <text x="165" y="778" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">/solar monitor page</text>
  <text x="165" y="796" text-anchor="middle" font-size="11" fill="#27500A">Battery · panel · yield · charge state</text>
</g>
<line x1="165" y1="806" x2="165" y2="820" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Topbar -->
<g class="node" data-tip="Every screen shows a battery dot (green/yellow/red based on voltage from VE.Direct) and a connectivity dot (green pulse = Blink API reachable, red flash = offline). Visible at a glance." onclick="showTip(this)">
  <rect x="24" y="820" width="282" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.7"/>
  <text x="165" y="840" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Topbar status indicators</text>
  <text x="165" y="858" text-anchor="middle" font-size="11" fill="#5F5E5A">Battery dot · connectivity dot (all screens)</text>
</g>

<!-- ═══════════════════════════════════════════════════════
     STAGE 2 — SOFTWARE
     ═══════════════════════════════════════════════════ -->

<text x="490" y="62" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="1">ATM SCREENS</text>

<!-- Idle -->
<g class="node" data-tip="The idle screen shows the live EUR→sats exchange rate, the wallet fuel gauge (how many sats remain), and the INSERT COINS button. Coins are disabled if battery is critically low." onclick="showTip(this)">
  <rect x="350" y="70" width="282" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.7"/>
  <text x="491" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Idle screen</text>
  <text x="491" y="108" text-anchor="middle" font-size="11" fill="#5F5E5A">Rate · wallet gauge · INSERT COINS</text>
</g>
<line x1="491" y1="118" x2="491" y2="132" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Coins -->
<g class="node" data-tip="As coins are inserted the screen shows the euro value, the equivalent in sats at the live rate, and a text input for the visitor's Blink username. The SEND button appears when ready." onclick="showTip(this)">
  <rect x="350" y="132" width="282" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.7"/>
  <text x="491" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">Coins screen</text>
  <text x="491" y="170" text-anchor="middle" font-size="11" fill="#3C3489">EUR amount · sats value · username input</text>
</g>
<line x1="491" y1="180" x2="491" y2="194" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Sending -->
<g class="node" data-tip="The ESP32 posts the lnAddressPaymentSend GraphQL mutation to the Blink API. A 15 second timeout prevents the screen from freezing. If it fails, the visitor can retry — coins are not lost." onclick="showTip(this)">
  <rect x="350" y="194" width="282" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.7"/>
  <text x="491" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">Sending screen</text>
  <text x="491" y="232" text-anchor="middle" font-size="11" fill="#3C3489">Spinner · payment in flight · 15s timeout</text>
</g>
<line x1="491" y1="242" x2="491" y2="256" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Success -->
<g class="node" data-tip="On SUCCESS the screen shows a green tick, the sats amount, and the recipient username. A 4 second drain bar counts down before auto-resetting to idle for the next visitor." onclick="showTip(this)">
  <rect x="350" y="256" width="282" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.7"/>
  <text x="491" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Success screen</text>
  <text x="491" y="294" text-anchor="middle" font-size="11" fill="#0F6E56">Sats sent · 4s drain bar · auto reset</text>
</g>

<!-- Reset loop arrow -->
<path d="M632 280 L648 280 L648 94 L634 94" fill="none" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="651" y="190" text-anchor="start" font-size="9" fill="#aaa">reset</text>

<!-- Error retry arrow -->
<path d="M350 218 L336 218 L336 156 L348 156" fill="none" stroke="#A32D2D" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text x="300" y="190" text-anchor="middle" font-size="9" fill="#A32D2D">retry on fail</text>

<!-- Settings -->
<text x="491" y="328" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="1">OPERATOR SETTINGS</text>
<g class="node" data-tip="Hold the ⚡ logo for 3 seconds then enter PIN 1928. Operator can update WiFi SSID/password, Blink BTC wallet ID, API key, and pulses per euro. Saved to ESP32 flash — survives reboots." onclick="showTip(this)">
  <rect x="350" y="336" width="282" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.7"/>
  <text x="491" y="358" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Settings overlay</text>
  <text x="491" y="374" text-anchor="middle" font-size="11" fill="#5F5E5A">PIN protected · 3s logo hold · PIN 1928</text>
  <text x="491" y="390" text-anchor="middle" font-size="11" fill="#5F5E5A">WiFi · wallet ID · API key · pulses/€</text>
</g>

<!-- Solar monitor software -->
<text x="491" y="420" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="1">SOLAR MONITOR</text>
<g class="node" data-tip="Served at 192.168.4.1/solar. Reads VE.Direct data from the Victron MPPT via ESP32 Serial2 (GPIO16). Updates every 2 seconds. Shows battery SoC bar, panel watts, charge state, yield." onclick="showTip(this)">
  <rect x="350" y="428" width="282" height="60" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.7"/>
  <text x="491" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">Solar monitor /solar</text>
  <text x="491" y="466" text-anchor="middle" font-size="11" fill="#27500A">Battery V · SoC bar · panel W · current</text>
  <text x="491" y="482" text-anchor="middle" font-size="11" fill="#27500A">Charge state · today's yield (Wh)</text>
</g>

<!-- API Layer -->
<text x="491" y="514" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="1">BLINK API LAYER</text>

<!-- Rate fetch -->
<g class="node" data-tip="On boot the ESP32 queries btcPriceList from the Blink GraphQL API to get the current BTC/USD price, then calculates how many sats equal 1 EUR. Displayed on the idle screen." onclick="showTip(this)">
  <rect x="350" y="522" width="282" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.7"/>
  <text x="491" y="542" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Blink — rate fetch</text>
  <text x="491" y="560" text-anchor="middle" font-size="11" fill="#0F6E56">btcPriceList · calculates EUR → sats rate</text>
</g>
<line x1="491" y1="570" x2="491" y2="584" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Balance poll -->
<g class="node" data-tip="Every 15 seconds (when idle) the ESP32 queries the wallet balance to keep the fuel gauge accurate. The gauge shows remaining sats relative to the starting balance." onclick="showTip(this)">
  <rect x="350" y="584" width="282" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.7"/>
  <text x="491" y="604" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Blink — balance poll</text>
  <text x="491" y="622" text-anchor="middle" font-size="11" fill="#0F6E56">Every 15s · updates wallet fuel gauge</text>
</g>
<line x1="491" y1="632" x2="491" y2="646" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Payment send -->
<g class="node" data-tip="The ESP32 posts a lnAddressPaymentSend GraphQL mutation with the wallet ID, visitor's Lightning address (username@blink.sv), and sats amount. Uses HTTPS with the operator's API key." onclick="showTip(this)">
  <rect x="350" y="646" width="282" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.7"/>
  <text x="491" y="668" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Blink — payment send</text>
  <text x="491" y="684" text-anchor="middle" font-size="11" fill="#0F6E56">lnAddressPaymentSend · GraphQL · HTTPS</text>
  <text x="491" y="700" text-anchor="middle" font-size="11" fill="#0F6E56">Authenticated with operator API key</text>
</g>
<line x1="491" y1="706" x2="491" y2="720" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Visitor wallet stage 2 -->
<g class="node" data-tip="Sats arrive in the visitor's Blink Lightning wallet instantly. The Lightning Network settles the payment peer-to-peer — no bank, no delay, no minimum amount." onclick="showTip(this)">
  <rect x="350" y="720" width="282" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.7"/>
  <text x="491" y="740" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Visitor Blink wallet</text>
  <text x="491" y="758" text-anchor="middle" font-size="11" fill="#0F6E56">Lightning · instant · peer to peer</text>
</g>

<!-- Connectivity dot feedback -->
<path d="M350 744 L334 744 L334 844 L348 844" fill="none" stroke="#aaa" stroke-width="0.6" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text x="320" y="796" text-anchor="middle" font-size="8" fill="#aaa" transform="rotate(-90,320,796)">conn. dot</text>

<!-- ═══════════════════════════════════════════════════════
     STAGE 3 — TIP THE ART
     ═══════════════════════════════════════════════════ -->

<text x="820" y="62" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="1">VISITOR RECEIVES SATS</text>

<g class="node" data-tip="After the ATM sends sats, the visitor now has a Lightning Bitcoin balance in their Blink app. They are ready to tip the artwork directly — no cash, no card, no account needed." onclick="showTip(this)">
  <rect x="678" y="70" width="282" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.7"/>
  <text x="819" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Sats in Blink wallet</text>

<div id="tip"></div>

<script>
  let tipTimer;
  function showTip(el) {
    const t = document.getElementById('tip');
    t.textContent = el.getAttribute('data-tip');
    t.classList.add('show');
    clearTimeout(tipTimer);
    tipTimer = setTimeout(() => t.classList.remove('show'), 5000);
  }
  // Also close on background click
  document.getElementById('diagram').addEventListener('click', function(e) {
    if (!e.target.closest('.node')) {
      document.getElementById('tip').classList.remove('show');
    }
  });
</script>
